name: Unity Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-license:
    name: Check Unity license
    runs-on: ubuntu-latest
    outputs:
      has-license: ${{ steps.check.outputs.has-license }}
    steps:
      - name: Probe secrets
        id: check
        env:
          HAS_PERSONAL: ${{ secrets.UNITY_LICENSE != '' }}
          HAS_PRO: ${{ secrets.UNITY_SERIAL != '' && secrets.UNITY_EMAIL != '' && secrets.UNITY_PASSWORD != '' }}
        run: |
          if [ "$HAS_PERSONAL" = "true" ] || [ "$HAS_PRO" = "true" ]; then
            echo "has-license=true" >> "$GITHUB_OUTPUT"
            echo "Unity license credentials present — will run tests."
          else
            echo "has-license=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Unity tests skipped"
              echo ""
              echo "No Unity license secrets configured in this repository."
              echo ""
              echo "To enable this workflow, add one of:"
              echo "- \`UNITY_LICENSE\` (base64-encoded personal \`.ulf\`, single line), OR"
              echo "- \`UNITY_SERIAL\` + \`UNITY_EMAIL\` + \`UNITY_PASSWORD\` (professional)."
              echo ""
              echo "See \`.claude/skills/unity-ci-validation/SKILL.md\` for the activation recipe."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::UNITY_LICENSE (or UNITY_SERIAL/UNITY_EMAIL/UNITY_PASSWORD) not configured — skipping Unity test job."
          fi

  editmode:
    name: EditMode / Unity ${{ matrix.unity-version }}
    needs: check-license
    if: needs.check-license.outputs.has-license == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        unity-version: ['6000.0.33f1']
        test-mode: ['editmode']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.unity-version }}-${{ hashFiles('package.json', '**/*.asmdef', '**/*.cs') }}
          restore-keys: |
            Library-${{ matrix.unity-version }}-
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ matrix.unity-version }}
          testMode: ${{ matrix.test-mode }}
          artifactsPath: artifacts/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode ${{ matrix.unity-version }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: artifacts/**/*.xml
          if-no-files-found: warn

  summary:
    name: Test summary
    needs: [check-license, editmode]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        env:
          LICENSE_RESULT: ${{ needs.check-license.result }}
          EDITMODE_RESULT: ${{ needs.editmode.result }}
        run: |
          echo "check-license: $LICENSE_RESULT"
          echo "editmode:      $EDITMODE_RESULT"
          # Fail only on an actual test failure. 'skipped' (no license secret) is OK.
          if [ "$EDITMODE_RESULT" = "failure" ]; then
            echo "::error::EditMode tests failed"
            exit 1
          fi
          if [ "$LICENSE_RESULT" = "failure" ]; then
            echo "::error::check-license job failed"
            exit 1
          fi
