name: Unity Package Checks

on:
  pull_request:
    paths:
      - 'Editor/**'
      - 'Plugins/**'
      - 'Shaders/**'
      - 'Native/**'
      - '**.md'
      - 'package.json'
      - 'build_native.bat'

jobs:
  meta-files:
    name: Validate .meta files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for missing .meta files
        run: |
          EXIT=0
          # Unity package root files (imported by Unity when consumed as UPM package).
          # Root-level user-facing files need .meta because Unity treats the package
          # root as an immutable folder and warns about orphan assets.
          ROOT_FILES=(
            package.json
            build_native.bat
            AGENTS.md
            CHANGELOG.md
            CLAUDE.md
            CONFLICT_CHECK_LAST_5_PRS.md
            EXPERIMENTS.md
            README.md
            REVIEW.md
          )
          for f in "${ROOT_FILES[@]}"; do
            if [ -f "$f" ] && [ ! -f "${f}.meta" ]; then
              echo "::error::Missing .meta file for: ${f}"
              EXIT=1
            fi
          done
          # Check all tracked files in Editor/, Plugins/, Shaders/, Native/ that need .meta
          for f in $(find Editor Plugins Shaders Native -type f \
            ! -name '*.meta' \
            ! -name '.gitkeep' \
            ! -name '.DS_Store' \
            2>/dev/null); do
            if [ ! -f "${f}.meta" ]; then
              echo "::error::Missing .meta file for: ${f}"
              EXIT=1
            fi
          done
          # Check for orphaned .meta files (no matching file/dir)
          for m in $(find Editor Plugins Shaders Native -name '*.meta' 2>/dev/null); do
            target="${m%.meta}"
            if [ ! -e "$target" ]; then
              echo "::warning::Orphaned .meta file (no matching file/dir): ${m}"
            fi
          done
          # Check directories have .meta
          for d in $(find Editor Plugins Shaders Native -type d ! -path '.' 2>/dev/null); do
            if [ ! -f "${d}.meta" ]; then
              echo "::error::Missing .meta file for directory: ${d}"
              EXIT=1
            fi
          done
          if [ $EXIT -eq 0 ]; then
            echo "All .meta files present"
          fi
          exit $EXIT

  package-json:
    name: Validate package.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check package.json is valid JSON
        run: python3 -c "import json; json.load(open('package.json'))"

      - name: Check version format (semver)
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          if echo "$VERSION" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "Version: $VERSION"
          else
            echo "::error::Invalid version format: $VERSION (expected semver X.Y.Z)"
            exit 1
          fi
